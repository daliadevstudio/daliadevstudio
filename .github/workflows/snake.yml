name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      
      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3f2175fa
        with:
          node-version: '20'
          
      - name: Install and Run Snake
        run: |
          npm install -g github-contributions-snake
          mkdir -p dist
          github-contributions-snake daliadevstudio --output dist/github-contribution-grid-snake-dark.svg --palette github-dark
          
      - name: Push to output branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b output
          git add dist/
          git commit -m "Generate snake"
          git push origin output --force
